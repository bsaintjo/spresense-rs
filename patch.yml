_svd: "./cxd5602.svd"

CPU_FIFO:
  FIF_PUSH_CMP:
    PUSH_CMP:
      _replace_enum:
        "DontCare": [0, ""]
        "Complete": [1, ""]
  FIF_PULL_CMP:
    PULL_CMP:
      _replace_enum:
        "DontCare": [0, ""]
        "Complete": [1, ""]
  FIF_PUSH_FULL:
    FULL_FLAG:
      _replace_enum:
        NotFull: [0, ""]
        Full: [1, ""]
  FIF_PULL_EMP:
    EMPTY_FLAG:
      _replace_enum:
        NotEmpty: [0, ""]
        Empty: [1, ""]


ROT:
  CONV_CTRL:
    CONV_CALC_SEL:
      _replace_enum:
        FROM16TO240RANGE: [0, "16 .. 240 range"]
        FROMNEG127TO127RANGE: [1, "-127 .. 127 range"]
  SET_DIRECTION:
    ROT:
      _replace_enum:
        NoRotation: [0, ""]
        Right90degrees: [1, ""]
        Right180degrees: [2, ""]
        Right270degrees: [4, ""]

_add:
  GPIO0:
    description: "GPIO Port 0 — GP_* output-enable/data registers"
    # SYS pins 1-49:  offset = (pin - 1) * 4  (0x000 .. 0x0C0)
    # APP pins 56-105: offset = (pin - 7) * 4  (0x0C4 .. 0x188)
    # CXD56_TOPREG_GP_I2C4_BCK = CXD56_SYS_MIRROR(0x04000000)
    #   + 0x00100000 + 0x2000 = 0x04102000
    baseAddress: 0x04102000
    addressBlock:
      offset: 0x0
      size: 0x200
      usage: "registers"
    registers:
      GP_I2C4_BCK:
        description: "GPIO SYS pin 1 — I2C4 clock / Arduino D14"
        addressOffset: 0x000
        access: read-write
        resetValue: 0x00010000
        fields:
          DIR:
            description: "Output enable, active-low (0 = drive output, 1 = high-Z input)"
            bitOffset: 16
            bitWidth: 1
            enumeratedValues:
              - name: Enable
                description: "Drive output"
                value: 0
              - name: Disable
                description: "High-impedance input"
                value: 1
          OUT:
            description: "Output data"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
          IN:
            description: "Sampled pin level (read)"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
      PIN97:
        description: "GPIO APP pin 97 — I2S1_BCK / LED0 on Spresense main board"
        addressOffset: 0x168
        access: read-write
        resetValue: 0x00010000
        fields:
          DIR:
            description: "Output enable, active-low (0 = drive output, 1 = high-Z input)"
            bitOffset: 16
            bitWidth: 1
            enumeratedValues:
              - name: Enable
                description: "Drive output"
                value: 0
              - name: Disable
                description: "High-impedance input"
                value: 1
          OUT:
            description: "Output data"
            bitOffset: 8
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1
          IN:
            description: "Sampled pin level (read)"
            bitOffset: 0
            bitWidth: 1
            enumeratedValues:
              - name: Low
                description: ""
                value: 0
              - name: High
                description: ""
                value: 1